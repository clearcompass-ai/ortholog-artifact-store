# ============================================================================
# ortholog-artifact-store — Weekly flake detection
#
# Runs the full test suite 50 times. Any single failure across 50 runs
# is a flake. Flakes are not tolerated — if this job fails, the failing
# test is either fixed that week or quarantined with a skip + issue link.
#
# Flaky tests erode trust in the signal. A test suite with 2% flake rate
# and a genuine regression looks identical in the log to a test suite
# with 0% flake rate. Fixing flakes the week they appear is the only way
# to preserve the signal.
# ============================================================================

name: flake-detect

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of iterations (default 50)"
        required: false
        default: "50"

permissions:
  contents: read
  issues: write

env:
  GO_VERSION: "1.22"

jobs:
  flake-detect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: run flake-detector.sh
        env:
          RUNS: ${{ inputs.runs || '50' }}
        run: bash scripts/flake-detector.sh

      - name: open issue on flake
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Flaky test detected (run ${context.runId})`;
            const body = `
            The weekly flake-detect job failed. One or more tests failed
            inconsistently across 50 runs.

            - Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Action: fix the flaky test(s) this week, or skip with \`t.Skip(...)\`
            and link this issue.
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["flake", "test-infra"],
            });
